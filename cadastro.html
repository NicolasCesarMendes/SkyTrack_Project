<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Drones</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="body-cadastro"> <a href="index.html" class="btn-voltar">Ir para o Início</a>

    <form action="#" method="POST" class="form-drone">
        <h2>Cadastrar Drone</h2>

        <label for="campo-nome">Nome do Drone:</label>
        <input type="text" id="campo-nome" name="nome" placeholder="Digite o nome do drone.." required>

        <label for="nro-serie">Número de Série</label>
        <input type="text" minlength="8" id="nro-serie" name="serie" placeholder="Digite o número de série.." required>

        <label for="campo-bateria">Autonomia de Bateria:</label>
        <input type="number" max="120" id="campo-bateria" name="bateria" placeholder="Digite quantos minutos a bateria dura.." required>

        <label for="setores">Setor: </label>
        <select name="setores">
            <option value="" disabled selected>Selecione..</option>
            <option value="rapida">Entrega Rápida</option>
            <option value="pesada">Pesada</option>
            <option value="inspec">Inspeção</option>
        </select> 

        <div class="radio-group">
            <input type="radio" name="estado" value="ativo" id="ativo">
            <label for="ativo">Ativo</label>
        </div>

        <div class="radio-group">
            <input type="radio" name="estado" value="manutenc" id="manutenc">
            <label for="manutenc">Em manutenção</label>
        </div>

        <label for="campo-senha">Senha do Operador:</label>
        <input type="password" id="campo-senha" name="senha" placeholder="Digite a senha do operador.." required>

        <button type="submit" class="btn-cadastrar">Cadastrar Drone</button>
    </form>  
</body>
</html>
